syntax = "proto3";

package client;

option java_multiple_files = true;
option java_package = "com.onidza.grpc.client";
option java_outer_classname = "ClientQueryProto";

service ClientQueryService {
  rpc GetClientForNotification(GetClientRequest) returns (ClientForNotificationResponse);
}

message GetClientRequest  {
  int64 client_id = 1;
}

message ClientForNotificationResponse {
  string name = 2;
  string email = 3;
}